services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: unfallatlas
      POSTGRES_USER: unfallatlas
      POSTGRES_PASSWORD: unfallatlas
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unfallatlas"]
      interval: 5s
      timeout: 5s
      retries: 10
  backend:
    build: ./backend
    depends_on:
      db: {condition: service_healthy}
    env_file: .env
    ports: ["8000:8000"]
    volumes: ["./data:/app/data:ro"]
    command: sh -c "alembic upgrade head && python -m etl.runner --source all && uvicorn app.main:app --host 0.0.0.0 --port 8000"
  frontend:
    build: ./frontend
    depends_on: [backend]
    ports: ["5173:80"]
volumes:
  pgdata:
